name: Split Packages

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

env:
  # PAT secret with write access to split repositories.
  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: 'core'
            split_repository: 'core'
          - local_path: 'cli'
            split_repository: 'cli'
          - local_path: 'mcp'
            split_repository: 'mcp'
          - local_path: 'drivers/github'
            split_repository: 'github'
          - local_path: 'drivers/gmail'
            split_repository: 'gmail'
          - local_path: 'drivers/linear'
            split_repository: 'linear'
          - local_path: 'drivers/notion'
            split_repository: 'notion'
          - local_path: 'drivers/slack'
            split_repository: 'slack'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - if: "!startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.0
        env:
          GITHUB_TOKEN: ${{ env.ACCESS_TOKEN }}
        with:
          package_directory: 'packages/${{ matrix.package.local_path }}'
          repository_organization: 'sanvexdev'
          repository_name: '${{ matrix.package.split_repository }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - if: "startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.0
        env:
          GITHUB_TOKEN: ${{ env.ACCESS_TOKEN }}
        with:
          tag: ${{ github.ref_name }}
          package_directory: 'packages/${{ matrix.package.local_path }}'
          repository_organization: 'sanvexdev'
          repository_name: '${{ matrix.package.split_repository }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
