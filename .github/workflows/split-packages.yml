name: Split Packages

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: 'packages/core'
            split_repository: 'core'
          - local_path: 'packages/cli'
            split_repository: 'cli'
          - local_path: 'packages/mcp'
            split_repository: 'mcp'
          - local_path: 'packages/drivers/github'
            split_repository: 'github'
          - local_path: 'packages/drivers/gmail'
            split_repository: 'gmail'
          - local_path: 'packages/drivers/linear'
            split_repository: 'linear'
          - local_path: 'packages/drivers/notion'
            split_repository: 'notion'
          - local_path: 'packages/drivers/slack'
            split_repository: 'slack'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - if: "!startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.0
        with:
          package_directory: '${{ matrix.package.local_path }}'
          repository_organization: 'sanvexdev'
          repository_name: '${{ matrix.package.split_repository }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          access_token: ${{ secrets.ACCESS_TOKEN }}

      - if: "startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.0
        with:
          tag: ${{ github.ref_name }}
          package_directory: '${{ matrix.package.local_path }}'
          repository_organization: 'sanvexdev'
          repository_name: '${{ matrix.package.split_repository }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          access_token: ${{ secrets.ACCESS_TOKEN }}
